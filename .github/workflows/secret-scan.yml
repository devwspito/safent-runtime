name: secret-scan

# Fail the build if a real credential is ever committed. Runs on every push/PR and
# scans the FULL git history (not just the diff), using .gitleaks.toml (which
# allow-lists only the known fake test fixtures, by exact value). This is the gate
# that keeps the open-source Community repo safe as it grows.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pin gitleaks by version + verify checksum-free official release. Running the
      # binary directly (not gitleaks-action) avoids the org-license requirement and
      # keeps the gate dependency-light.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan full history for secrets
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 1

      - name: Upload findings (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
