name: publish-image

# Build + push the hardened Safent image (multi-arch) so `npx @devwspito/safent`
# can pull it. Triggers on a version tag (e.g. `git tag v0.1.0 && git push --tags`)
# or manually. Decoupled from the test/threat-model gates of agents-os-edition.yml.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/devwspito/safent

jobs:
  build-push:
    name: Build & push multi-arch (amd64+arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ops/container/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            FE_CACHEBUST=${{ github.sha }}
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.ref_type == 'tag' && github.ref_name || 'edge' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
