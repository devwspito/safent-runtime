<!DOCTYPE html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Safent — Tu agente de IA personal" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0b0d" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230A84FF'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-size='18' fill='white' font-family='system-ui' font-weight='700'%3EL%3C/text%3E%3C/svg%3E" />
    <title>Safent</title>
    <!-- Theme applied before first paint to avoid FOUC -->
    <script>
      (function () {
        // Dark "Sereno" is the product identity — default to it unconditionally.
        // Only an explicit user choice (localStorage) overrides; OS preference does NOT
        // (headless / light-mode machines were silently flipping the whole app to light).
        var t = localStorage.getItem('safent-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <!--safent-token-injection-placeholder-->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
