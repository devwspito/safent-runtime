# Garantiza ownership y permisos de /var/lib/hermes en cada boot.
# El bake-time chown del Containerfile puede perderse cuando bib genera
# el qcow2; esta config systemd-tmpfiles lo asegura al boot del SO.

d /var/lib/hermes        0755 hermes hermes - -
d /var/lib/hermes/data   0750 hermes hermes - -
# shell-state.db (la BD del daemon: providers, keys cifradas, conversaciones,
# config) DEBE ser owner-only. SQLite la crea 0644 (legible por grupo+otros) →
# un usuario distinto (hermes-sandbox, el sandbox del agente) podría leerla, e
# incluso escribirla vía /proc/<daemon>/fd (hallazgo red-team ALTO 2026-06-19:
# el agente truncó la BD). 'z' re-asserta 0600 en cada boot si existe (el daemon
# además la pre-crea 0600 en el arranque para cerrar la ventana del primer boot).
# -wal/-shm heredan el modo de la BD principal (SQLite), pero los fijamos también.
z /var/lib/hermes/shell-state.db     0600 hermes hermes - -
z /var/lib/hermes/shell-state.db-wal 0600 hermes hermes - -
z /var/lib/hermes/shell-state.db-shm 0600 hermes hermes - -
# Webui bootstrap secret (C3 PASS-5). The plaintext gates the GET / handshake
# that mints session tokens; it MUST stay unreadable by the daemon/shell uid
# (880 hermes) and the agent/MCP uid (886 hermes-sandbox) AND its commitment must
# be UNREPLACEABLE by them. PASS-2 made the files root-owned but left them in
# /var/lib/hermes/ (0755 hermes) — uid 880 could unlink/rename the commitment.
# PASS-3 moved them into a bootstrap/ subdir (root:root) so uid 880/886 cannot
# replace the FILES. PASS-4 recreated that subdir from scratch each boot. PASS-5
# closes the LAST leg: the PARENT was STILL /var/lib/hermes (0755 hermes), so
# uid 880 could rename/unlink the root-owned `bootstrap` ENTRY itself (Unix:
# renaming a dir entry is governed by WRITE on the CONTAINING dir, not the entry's
# mode) and substitute its own dir/symlink + a commitment of a secret it chose.
#
# CLASS FIX: the bootstrap dir now lives under a SEPARATE, ROOT-OWNED parent that
# uid 880/886 cannot write — /var/lib/hermes-bootstrap (0755 root:root), a SIBLING
# of /var/lib/hermes. uid 880 cannot rename/replace the `bootstrap` entry because
# it cannot write that parent at all. tmpfiles creates ONLY this root-owned parent
# (a 'd' entry; idempotent, re-asserted root:root 0755 every boot). The container
# dropin's root `ExecStartPre=+…` remains the SOLE authority for the `bootstrap`
# SUBDIR and its files: every boot it O_NOFOLLOW-opens this root parent,
# fstat-verifies it is root-owned, purges ANY pre-existing `bootstrap` entry, and
# recreates the dir + a FRESH secret/commitment from scratch (see
# `_provision_bootstrap_secret` in hermes.shell_server.main). tmpfiles does NOT
# touch the subtree below the parent, so it can never adopt attacker-planted state.
#   /var/lib/hermes-bootstrap/                       0755 root:root  — tmpfiles.
#   /var/lib/hermes-bootstrap/bootstrap/             0755 root:root  — fresh/boot.
#   …/bootstrap/webui-bootstrap        0400 root:root  — PLAINTEXT (host owner reads
#                                    it via `podman exec … cat`); rotates per boot.
#   …/bootstrap/webui-bootstrap.commit 0444 root:root  — COMMITMENT (hex SHA-256),
#                                    world-readable so the shell-server (uid 880)
#                                    can VERIFY; non-invertible; rotates per boot.
d /var/lib/hermes-bootstrap 0755 root root - -
d /var/lib/hermes/audit  0770 hermes hermes - -
d /var/lib/hermes/skills  0750 hermes hermes - -
# F4: memoria confinada por tenant (el motor Nous persiste contexto aquí).
# Mismo owner/mode que skills: solo el daemon (User=hermes) tiene acceso.
d /var/lib/hermes/memory  0750 hermes hermes - -
# Cache del SDK de Composio (COMPOSIO_CACHE_DIR). Sin un dir escribible aquí,
# `import composio` cae a $HOME/.composio, que ProtectHome=yes enmascara →
# crash-loop del shell-server. Ambos servicios corren User=hermes.
d /var/lib/hermes/composio-cache 0750 hermes hermes - -
# Caches de los runners MCP (npx/uvx) que el daemon lanza (npm EACCES en $HOME).
d /var/lib/hermes/npm-cache 2770 hermes hermes-work - -
d /var/lib/hermes/uv-cache 2770 hermes hermes-work - -
# HOME escribible del mcp-launcher: bajo ProtectSystem=strict + ProtectHome=yes el
# HOME real (/var/home/hermes) es read-only → npx/node mkdir $HOME/.npm = EACCES y
# @playwright/mcp (el navegador del agente) no arranca. El unit fija HOME aquí.
d /var/lib/hermes/mcp-home 2770 hermes hermes-work - -
# $HERMES_HOME del runtime: hermes_cli persiste .env/config.yaml/auth.json aquí
# (no en $HOME, que ProtectHome=yes enmascara). Sin este dir escribible,
# resolve_runtime_provider + AIAgent lanzan PermissionError → ninguna llamada LLM
# real funciona (TestProvider y chat). Solo el daemon (User=hermes) accede.
d /var/lib/hermes/hermes-home 0750 hermes hermes - -
# W24/W25 — data-dir del navegador HEADED VISIBLE del Cerebro. Lo lanza el
# COMPOSITOR (User=hermes-user, uid 1000) en wayland-0, así que el dir debe ser
# escribible por hermes-user (no por el daemon hermes). Sin esto Chromium da
# "Failed To Create Data Directory" y arranca degradado/con diálogo de error.
d /var/lib/hermes/chromium-cerebro-data 0700 hermes-user hermes-user - -
# config.yaml de hermes-agent: fija las tareas auxiliares al OpenAI del usuario
# (provider:custom) en vez de "auto" (que sondea openrouter/nous → latencia ~40s).
# 'C' copia desde /usr/share solo si el target no existe (no pisa cambios runtime).
C /var/lib/hermes/hermes-home/config.yaml 0640 hermes hermes - /usr/share/hermes/config.yaml
# SOUL.md: identidad FIJA del Cerebro. 0444 = read-only (el prompt no es editable;
# el tono va por /personality, overlay de sesión). 'C' siembra solo si no existe.
C /var/lib/hermes/hermes-home/SOUL.md 0444 hermes hermes - /usr/share/hermes/SOUL.md

# Remote-control (FR-056 ReadWritePaths).
d /run/agents-os                       0755 root      root      - -
d /run/agents-os/remote-control        0750 hermes-rc hermes-rc - -

# Runtime socket/PID dirs requeridos por ReadWritePaths= en cada unit.
# Sin estas entradas systemd-tmpfiles no los crea antes del primer start
# y ProtectSystem=strict hace fallar el mount namespace con ENOENT.
#
# T046 / CTRL-P1-9 / F-4 (threat-model §6):
#   /run/hermes: 0750 hermes:hermes — solo el daemon (hermes) y miembros del
#   grupo hermes acceden al directorio. hermes-user está en el grupo hermes
#   (bib-config.toml:groups=["hermes"]), lo que le permite conectarse al socket
#   Unix tasks.sock para recibir chunks de tarea.
#
#   tasks.sock: 0660 root:hermes — socket Unix AF_UNIX propiedad de root,
#   grupo hermes, permisos 0660. El daemon (User=hermes) es el único writer;
#   hermes-user (grupo hermes) es el único lector autorizado por SO.
#   El adapter unix_stream_socket.py verifica SO_PEERCRED adicionalmente
#   (CTRL-P1-8: el UID del socket no es la única defensa).
#
#   F-4 FIRMADO — AVISO CRÍTICO DE PRODUCCIÓN:
#   El stream de tareas es PII (chunks de DOM, datos de cliente, resultados del
#   agente). Constitución III prohíbe que viaje por el proveedor de inferencia.
#   El canal ES Unix-socket loopback-only — NUNCA TCP, NUNCA 0.0.0.0.
#
#   El archivo hermes-shell-server.service define:
#     Environment=HERMES_SHELL_BIND_HOST=127.0.0.1   ← PRODUCCIÓN: loopback
#   Para entornos QEMU de desarrollo existe un drop-in OPCIONAL:
#     /etc/systemd/system/hermes-shell-server.service.d/qemu-dev.conf
#       con Environment=HERMES_SHELL_BIND_HOST=0.0.0.0
#   ESE DROP-IN JAMÁS SE BAKEA EN LA IMAGEN DE PRODUCCIÓN (OCI / bib qcow2).
#   Nunca añadir HERMES_SHELL_BIND_HOST=0.0.0.0 al Containerfile.
#   El socket tasks.sock es independiente del bind host del shell-server,
#   pero el principio loopback-only aplica a toda la superficie local de PII.
#
# 'e' limpia el socket stale si el daemon no lo eliminó en shutdown limpio
# (el tipo 's' crea solo si no existe; 'e' garantiza permisos correctos en
# un socket preexistente, por si el daemon lo crea antes que tmpfiles).
# 0770 (no 0750): el COMPOSITOR corre como hermes-user (grupo hermes) y debe
# ESCRIBIR /run/hermes/session-input.token aquí (el diseño lo dice: "hermes-user
# writes it"). Con 0750 el grupo no tenía write → PermissionError al arrancar el
# compositor. 0770 da write al grupo hermes (solo daemon=hermes + compositor=hermes-user
# son miembros; ambos confiables). El socket PII tasks.sock sigue 0660 root:hermes aparte.
d /run/hermes         0770 hermes         hermes         - -
# Isolated subdir for the one-time account-setup staged credentials.
# Mode 0700 (owner hermes only) means no other process with group hermes
# membership — including hermes-user — can reach the credential file.
# hermes-account-apply.service (root) can always read it (root bypasses DAC).
# TOCTOU mitigation: the script opens with O_NOFOLLOW and fstat-verifies
# uid/mode/nlink before reading (see hermes-account-apply).
d /run/hermes/setup   0700 hermes         hermes         - -
# account-request.json is written to /run/hermes/setup/ by the shell-server
# (User=hermes) and read+shredded by hermes-account-apply.service (root).
# The file itself is created 0600 by the endpoint (owner hermes).

# Remote-access control drop dir for consent-gated enable/disable.
# Mode 0700 hermes-user:hermes-user — SOLO el COMPOSITOR (la UI operada por el
# humano, User=hermes-user) puede escribir aquí. El AGENTE/daemon (User=hermes)
# está EXCLUIDO a propósito (InaccessiblePaths en hermes-runtime.service): un
# agente comprometido NO debe poder pedir acceso remoto. La verja final es el PAM
# de la contraseña del dispositivo en hermes-remote-access-control (root).
# TOCTOU: el script root abre O_NOFOLLOW y fstat-verifica uid(hermes-user)/mode/nlink.
d /run/hermes/remote-control 0700 hermes-user hermes-user - -
d /run/hermes-cp      0750 hermes-cp      hermes-cp      - -
d /run/hermes-whisper 0750 hermes-whisper hermes-whisper - -

# host-operation MVP: session-input bridge socket + per-boot token.
# Socket is created by hermes-session-input.service (hermes-user); 'e' adjusts
# perms if it already exists.  0660 hermes:hermes allows daemon (User=hermes)
# to connect.  Token is 0600 hermes-user-owned (hermes-user writes it; the
# daemon traverses /run/hermes as group-hermes to read it).
e /run/hermes/session-input.sock  0660 hermes hermes - -
# Socket Unix del stream de tareas (canal de chunks PII — CTRL-P1-8/9/10).
# Tipo 'e' (ajusta atributos de la entrada existente) garantiza que si el
# daemon ya creó el socket (bind()) antes de que tmpfiles-setup.service
# aplique este bloque, los permisos queden 0660 root:hermes de todas formas.
# El daemon crea el socket en bind() con umask restrictivo; esta entrada es
# la red de seguridad de permisos en cada boot (idempotente).
e /run/hermes/tasks.sock 0660 root hermes - -

# Browser-launcher privileged socket (root:hermes, 0660).
# The launcher (root) creates it; 'e' adjusts perms if the socket pre-exists
# (e.g. on a service restart). Mode 0660 + group hermes = daemon (User=hermes)
# can connect; no other unprivileged user can.
# Design: specs/009-radiografia-os/kernel-browser-confinement-design.md §B
e /run/hermes/browser-launch.sock 0660 root hermes - -

# MCP-launcher socket en su PROPIO dir /run/hermes-mcp (NO /run/hermes).
# El launcher corre como hermes-sandbox (aislamiento /proc/fd 2026-06-19) y NO está en
# grupo `hermes` → no puede crear sockets en /run/hermes (0770 hermes:hermes). Su propio
# dir (owner hermes-sandbox, group hermes-work, 0750) le deja bindear, y a la vez evita
# que un MCP hijo malicioso (hermes-sandbox) toque los sockets de control de /run/hermes.
# El daemon (User=hermes, miembro de hermes-work) traversa /run/hermes-mcp por grupo y
# conecta; el peercred del launcher (uid==hermes ∧ gid==hermes) es la verja real.
d /run/hermes-mcp 0750 hermes-sandbox hermes-work - -
e /run/hermes-mcp/launch.sock 0660 hermes-sandbox hermes-work - -

# Browser session dirs: created on first launch; tmpfiles ensures the parent exists.
# group hermes-work + setgid (2770): the jailed Chromium runs as User=hermes-sandbox
# (NOT the daemon's `hermes`) so the agent can't reach the daemon's owner-only files
# via /proc/<daemon>/fd. hermes-sandbox accesses its profile via group hermes-work.
d /var/lib/hermes/browser-sessions 2770 hermes hermes-work - -
# Per-session user-data dir for the jailed browse Chromium (in the scope's
# ReadWritePaths). Owner hermes, group hermes-work (setgid) so hermes-sandbox writes.
d /var/lib/hermes/browser-sessions/exec-browse 2770 hermes hermes-work - -
# uvx DATA DIR y entornos-herramienta (Serena y otros MCP Python git-backed).
# XDG_DATA_HOME/UV_TOOL_DIR/UV_PYTHON_INSTALL_DIR apuntan aquí (unit + cliente stdio).
# hermes-home NO se duplica (ya declarado arriba, línea 23).
d /var/lib/hermes/xdg-data    2770 hermes hermes-work - -
d /var/lib/hermes/xdg-cache   2770 hermes hermes-work - -
d /var/lib/hermes/uv-tools    2770 hermes hermes-work - -
d /var/lib/hermes/uv-python   2770 hermes hermes-work - -
d /var/lib/hermes/tmp         0750 hermes hermes - -
# Workspace de entregables del Cerebro: imágenes, documentos, capturas, exports.
# 2770 hermes:hermes-work (setgid) — el daemon (User=hermes) escribe como owner;
# el AGENTE (terminal sandbox, User=hermes-sandbox) y el compositor (hermes-user)
# leen+escriben vía el grupo compartido hermes-work. SEPARADO de hermes-home
# (0750, secretos grupo hermes) → hermes-sandbox NO está en grupo hermes, así que
# no alcanza claves/config del daemon. setgid: ficheros nuevos heredan hermes-work.
d /var/lib/hermes/workspace   2770 hermes hermes-work - -

# Curated MCP pack seed: copy the baked default into place ONLY if the owner
# has no mcp-servers.json yet (C = copy-if-absent; never clobbers user edits).
# Pre-installs Replicate (imagen+vídeo); connects when the owner adds its token.
C /var/lib/hermes/mcp-servers.json 0640 hermes hermes - /usr/share/hermes/seed/mcp-servers.json
