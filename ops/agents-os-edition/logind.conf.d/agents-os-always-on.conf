# agents-os-always-on.conf — T020 — FR-041 (24/7 invariante).
# Cerrar tapa / pulsar power / idle = ignorar. Sin esto, Linux suspende
# por defecto cuando el laptop cierra tapa o entra en idle.

[Login]
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
HandlePowerKey=ignore
HandleSuspendKey=ignore
HandleHibernateKey=ignore
IdleAction=ignore
IdleActionSec=0
