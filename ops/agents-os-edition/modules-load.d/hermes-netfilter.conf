# /etc/modules-load.d/hermes-netfilter.conf
#
# Cargado por systemd-modules-load.service en el boot (Before=network.target).
# Garantiza que nf_conntrack y nf_log_syslog están presentes en el kernel
# antes de que hermes-browser-netns.service intente cargar las reglas nftables
# dentro del netns hermes-browser.
#
# Causa raíz del bug (status=255/EXCEPTION en ip netns exec hermes-browser nft):
#
#   El último ExecStart de hermes-browser-netns.service ejecuta:
#     ip netns exec hermes-browser nft -f /etc/nftables/hermes/browser-ns.nft
#
#   El fichero browser-ns.nft contiene dos expresiones que requieren módulos
#   kernel NO cargados por defecto en Fedora bootc minimal:
#
#   1. `ct state established,related accept` — exige nf_conntrack.
#      nf_conntrack ES per-netns pero el módulo debe estar cargado (en el init
#      netns) para que nf_tables pueda registrar la expresión ct en cualquier
#      netns. En un Fedora bootc minimal sin NetworkManager/firewalld activos
#      antes de que arranque este servicio, nf_conntrack puede no estar cargado
#      todavía (la unit es After=network-online.target, pero NM solo carga
#      nf_conntrack cuando establece la primera conexión, que puede ser
#      posterior).
#
#   2. `log prefix "..." level warn drop` — exige nf_log_syslog.
#      nf_log_syslog registra el backend de logging de nftables para los niveles
#      warn/info/notice/err en AF_INET, AF_INET6 y AF_BRIDGE. Su registro es
#      GLOBAL (no per-netns). Si el módulo no está cargado cuando nft intenta
#      registrar la expresión `log level warn`, el kernel devuelve ENOENT →
#      nft recibe MNL_CB_ERROR en su callback netlink → nft llama exit(255).
#      ESTE es el 255/EXCEPTION observado.
#      nf_log_syslog NO se carga automáticamente por NetworkManager, firewalld
#      ni ningún otro subsistema de red por defecto. Fedora 41 minimal no lo
#      carga en boot.
#
# FIX: cargar ambos módulos vía modules-load.d (systemd-modules-load.service)
# que corre Before=network.target, Before=hermes-browser-netns.service.
# Esto garantiza que los módulos están listos cuando la unit de confinamiento
# intenta registrar las reglas nftables dentro del netns.
#
# NO se relajan las reglas de seguridad: ct state y log level warn son parte
# del confinamiento default-deny. La única acción es asegurar que los módulos
# que esas reglas requieren estén cargados antes de que se carguen las reglas.
#
# Referencia: specs/009-radiografia-os/kernel-browser-confinement-design.md §2.2
# Spec:       specs/014-*/NFR-001 (jaula activa obligatoria)

nf_conntrack
nf_log_syslog
