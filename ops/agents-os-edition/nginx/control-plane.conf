# nginx — control plane reverse proxy (server profile).
#
# Spec 003 FR-006 + threat-model SURF-NET-01. mTLS termination delante
# del control plane FastAPI. Cosign-verified node certs.

upstream hermes_control_plane {
    server 127.0.0.1:8000 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # TLS hardening (Mozilla "Intermediate" 2024-12).
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:HermesSSL:50m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Server cert (generated at bootc install via certbot or local CA).
    ssl_certificate /etc/hermes-control-plane/tls/server.crt;
    ssl_certificate_key /etc/hermes-control-plane/tls/server.key;

    # mTLS for node enrollment endpoints (FR-007).
    ssl_client_certificate /etc/hermes-control-plane/tls/clients-ca.crt;
    ssl_verify_client optional;
    ssl_verify_depth 2;

    # HSTS (FR-058).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

    # Block any path that is not explicitly exposed.
    location / { return 404; }

    # Node enrollment (requires client cert).
    location /api/v1/nodes/ {
        if ($ssl_client_verify != SUCCESS) { return 401; }
        proxy_pass http://hermes_control_plane;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Operator UI (browser, requires JWT) and tail ingest.
    location /api/v1/operators/ {
        proxy_pass http://hermes_control_plane;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/audit/tail {
        if ($ssl_client_verify != SUCCESS) { return 401; }
        proxy_pass http://hermes_control_plane;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 16m;
    }

    # Healthcheck (public).
    location = /healthz {
        proxy_pass http://hermes_control_plane;
        access_log off;
    }
}
