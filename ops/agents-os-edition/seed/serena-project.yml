# Serena project config for the agent workspace (/var/lib/hermes/workspace).
# Baked as a tmpfiles copy-if-absent seed so first activation is deterministic:
#   - python_jedi: the ONLY zero-download Python language server (jedi-language-server
#     is pip-baked into the image). Auto-detection would pick pyright, whose runtime
#     uvx→PyPI→nodeenv→npm chain is dead inside the offline MCP cage.
#   - typescript: its language server is pre-provisioned into the MCP HOME at image
#     build (serena project index warm step in the Containerfile).
# Other languages (Go/Rust/Java/…) need language servers we do not bake — do not list
# them here or activation dies offline.
languages: ["python_jedi", "typescript"]
read_only: false
# The caged terminal (with command_guard + HITL) is the ONLY exec surface. Serena's
# shell tool would be an ungoverned exec primitive under the BUILTIN (no per-call HITL)
# trust tier — excluded at BOTH project and global config level (belt + braces).
excluded_tools: ["execute_shell_command"]
