<!--
  D-Bus system-bus policy — org.hermes.Runtime1 (local control-plane, verbos)
  ============================================================================

  THREAT MODEL: specs/006-agente-proceso-primario/threat-model.md
  Controls applied: CTRL-P1-2 (deny-default allow-list), CTRL-P1-7 (daemon UID excluido),
                    CTRL-P1-5 (read-only menos restrictivo), CTRL-P1-6 (flood-prevention layer)
  Gates addressed: G1 (spoofing D-Bus sender_uid)
  Firma requerida: F-2 — el conjunto exacto de UIDs de operador es configurable por instalación.

  PRINCIPIO BASE (CWE-862 / A01 OWASP):
  "Deny everything first, then grant minimally."
  La ausencia de una regla explícita de ALLOW produce denegación automática.
  El adapter dbus-fast (dbus_fast_runtime_adapter.py) resuelve el sender_uid
  del peer del bus (GetConnectionUnixUser / SO_PEERCRED), NUNCA de un campo
  del mensaje — esta política de bus es una capa adicional de profundidad, no
  el único control (CWE-290 defense-in-depth).

  NOTA F-2 (FIRMA DE USUARIO REQUERIDA — threat-model §6):
  El conjunto de UIDs autorizados para verbos mutadores está definido en esta
  política COMO EL USUARIO DE AUTOLOGIN ("hermes-user", usuario de operador
  por defecto en Agents OS Edition). En instalaciones con múltiples operadores
  humanos o credenciales distintas, AÑADIR un bloque <allow> por cada UID
  operador adicional y documentar el cambio en el threat-model actualizado.
  NUNCA añadir el grupo "hermes" completo como caller autorizado.

  EXCLUSIÓN EXPLÍCITA DEL DAEMON (CTRL-P1-7 / CWE-269):
  Los servicios que corren como usuario "hermes" (hermes-runtime, hermes-shell-server,
  consent-manager, hermes-keygen, hermes-audit-tail) SON EL DAEMON — no son
  callers legítimos de sus propios verbos mutadores. Permitirlos como callers
  abriría escalada: un worker comprometido podría re-enqueuer, pausar o aprobar
  sin pasar por el canal de identidad del operador. El daemon se identifica
  COMO EL OWNER del nombre de bus (send_destination / receive_sender), no
  como caller de interfaces.

  PEERS EXCLUIDOS EXPLÍCITAMENTE como callers de verbos mutadores:
    - hermes        (daemon, service user: hermes-runtime, shell-server, audit-tail)
    - hermes-cp     (control-plane remoto, contexto distinto — no local)
    - hermes-whisper (servicio ASR — no tiene rol de control)
    - hermes-rc     (remote-control — usa canal RDP/mTLS, no D-Bus local)
    - root          (no tiene rol de operador sobre el agente; acceso físico
                    de mantenimiento usa hermes-rescue.target con auth, no D-Bus)

  INSTALACIÓN:
    cp ops/agents-os-edition/dbus/org.hermes.Runtime1.conf \
       /etc/dbus-1/system.d/org.hermes.Runtime1.conf
  Bakeado en la imagen OCI vía Containerfile: COPY → /etc/dbus-1/system.d/
  El daemon dbus (systemd-dbus) recarga la política en cada start; no requiere
  reinicio del host para actualizaciones de política en caliente:
    dbus-send -system -type=method_call -dest=org.freedesktop.DBus
    /org/freedesktop/DBus org.freedesktop.DBus.ReloadConfig

  VALIDACIÓN XML: xmllint (con flag noout) sobre este fichero debe devolver 0.
-->

<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- ================================================================
       1. OWNERSHIP — solo el daemon puede poseer el nombre de bus.
       El daemon corre como usuario "hermes" (hermes-runtime.service:User=hermes).
       Cualquier otro proceso que intente reclamar "org.hermes.Runtime" recibe
       denegación de bus, impidiendo que un proceso no-autorizado simule ser el
       daemon (vector de spoofing del lado del servidor, CWE-290 inverso).
       ================================================================ -->
  <policy user="hermes">
    <!-- El daemon es el único que puede registrar el nombre de bus. -->
    <allow own="org.hermes.Runtime"/>

    <!--
      El daemon también necesita RECIBIR mensajes desde callers autorizados.
      Este bloque permite que el proceso "hermes" reciba llamadas en su propia
      interfaz (los callers envían; el daemon recibe). Sin este allow el bus
      bloquearía los mensajes entrantes antes de que lleguen al handler.
      NOTA: "recibir" aquí es el bus entregando al daemon los mensajes de callers
      ya autorizados por sus propias políticas de user= más abajo.
    -->
    <allow receive_sender="*"
           receive_interface="org.hermes.Runtime1"
           receive_type="method_call"/>

    <!--
      El daemon emite signals a callers suscritos. Permiso explícito para enviar
      signals desde org.hermes.Runtime1 a cualquier destino (los subscriptores
      los reciben si tienen receive_sender=org.hermes.Runtime autorizado).
    -->
    <allow send_destination="*"
           send_interface="org.hermes.Runtime1"
           send_type="signal"/>

    <!--
      El daemon responde a llamadas de método (replies). Los replies D-Bus
      tienen tipo "method_return" o "error"; son necesarios para que el caller
      reciba el valor de retorno.
    -->
    <allow send_type="method_return"/>
    <allow send_type="error"/>

    <!-- WEB UI (Lumen Cowork): el shell-server (User=hermes) SIRVE la web UI y
         PROXYA TODAS las llamadas del operador al daemon — chat, providers
         nativos, agentes, skills, MCP, tareas, seguridad, memoria, aprobaciones
         HITL. Los READS del daemon no hacen authZ (abiertos por diseño); los
         MUTADORES exigen un OperatorToken firmado (DbusRuntimeProxy.call_mutator
         lo acuña) — esa es la verja real. Un shell-server comprometido ya es
         game-over (posee master.key y puede acuñar tokens), por lo que un grant
         por-método aquí no añade defensa real: blanket method_call al daemon,
         igual que el bloque del operador (hermes-user). Los <allow> por-verbo de
         abajo quedan como documentación del contrato. -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_type="method_call"/>

    <!--
      AJUSTE ARQUITECTÓNICO (descubierto en VM 2026-06-02): el SHELL-SERVER de
      supervisión corre como User=hermes (servicio de sistema) y es quien PROXYA
      las llamadas del operador (chat→Enqueue, tablero→ListConfiguredTasks, etc.)
      al runtime por D-Bus. El threat-model original asumía que el operador
      (hermes-user) llamaba D-Bus DIRECTAMENTE; la implementación real proxya via
      shell-server (hermes). Sin este allow, TODA la supervisión queda denegada
      (chat 503, tablero available:false). Por eso se permite a "hermes" ENVIAR
      method_calls a org.hermes.Runtime.
      SEGURIDAD (CTRL-P1-7 relajado — REVISAR con security-engineer antes de
      multi-tenant): el runtime daemon (mismo uid hermes) en la práctica NO envía
      method_calls — actúa via el broker in-process, no por D-Bus a sí mismo. La
      autorización del operador se hace en la capa HTTP del shell-server (device
      auth). Un runtime comprometido ya es game-over con o sin esta regla.
      Endurecimiento futuro: correr el shell-server como hermes-user (su identidad
      D-Bus = operador) y revertir esto; requiere resolver el acceso del
      shell-server a las DBs propiedad de hermes.
    -->
    <!-- SECURITY FIX (finding #7): el grant anterior era send_type="method_call" sin
         restricción de member — cualquier método, incluidos Approve/PromoteSkill/Pause,
         era accesible para el proceso "hermes" (shell-server). Ahora se restringe a los
         únicos verbos que el shell-server necesita: los que proxya del operador.
         El shell-server actúa como proxy transparente: recibe petición HTTP del operador,
         llama al runtime por D-Bus con los mismos verbos que el operador usaría.
         Los verbos mutadores privilegiados (Approve, PromoteSkill, SignComposioSkill,
         BindCapabilityToAgent, SetAgentHouseRule) NO deben llamarse desde el daemon mismo:
         van siempre desde el operador (hermes-user), autenticado por HTTP en shell-server.
         Shell-server proxya Enqueue/Pause/Resume/GetQueueStatus/ListPending/GetTaskStatus.
         Approve/Reject EXCLUIDOS: son verbos HITL de mayor impacto; van SIEMPRE desde
         hermes-user (operador humano, uid 1000), nunca desde el proxy del daemon.
         CWE-441 confused-deputy fix: sin este grant, un proceso hermes comprometido
         no puede auto-aprobar HITL.  Belt-and-suspenders deny añadido abajo. -->

    <!-- Verbos que el shell-server (User=hermes) legítimamente proxya -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="Enqueue"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="Pause"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="Resume"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="GetQueueStatus"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="ListPending"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="GetTaskStatus"
           send_type="method_call"/>

    <!-- Introspect: necesario para que dbus-fast negocie la interfaz -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.freedesktop.DBus.Introspectable"
           send_member="Introspect"
           send_type="method_call"/>
  </policy>

  <!-- ================================================================
       2. DENY-POR-DEFECTO para todo lo que no es "hermes" como owner.
       Esta política de contexto <policy context="default"> aplica a todos
       los usuarios no listados explícitamente. CWE-862: el default seguro
       es denegar; los grants son excepciones mínimas documentadas.
       ================================================================ -->
  <policy context="default">
    <!--
      Bloquear el intento de reclamar el nombre de bus desde cualquier proceso
      que no sea "hermes". Previene que un proceso malicioso suplante al daemon.
    -->
    <deny own="org.hermes.Runtime"/>

    <!--
      Bloquear por defecto el envío de CUALQUIER método a la interfaz de control.
      Los usuarios específicos tienen allows más abajo.
      Esto incluye explícitamente los servicios peer que no deben tener acceso:
        - hermes-cp, hermes-whisper, hermes-rc (contextos distintos)
        - root (mantenimiento usa el target de rescate, no D-Bus de control)
    -->
    <deny send_destination="org.hermes.Runtime"
          send_interface="org.hermes.Runtime1"/>

    <!--
      Bloquear la recepción de signals de org.hermes.Runtime1 por defecto.
      Solo procesos con allow explícito (hermes-user) reciben signals.
      Reducción de superficie de información (CTRL-P1-5 — signals contienen
      metadatos de estado de la cola).
    -->
    <deny receive_sender="org.hermes.Runtime"
          receive_interface="org.hermes.Runtime1"/>
  </policy>

  <!-- ================================================================
       2b. GROUP HERMES — ELIMINADO (SECURITY FIX finding #7)
       ================================================================
       El grant group="hermes" con send_type="method_call" sin restricción de
       send_member daba a CUALQUIER proceso del grupo hermes acceso a TODOS los
       verbos mutadores (Approve, PromoteSkill, Pause, etc.). Esto viola el
       principio de mínimo privilegio (CWE-862): el grupo hermes incluye procesos
       de servicio (shell-server, runtime, audit-tail) que no deben poder llamar
       mutadores entre sí sin pasar por el canal de identidad del operador.

       La cobertura para "custom operator username en el grupo hermes" es incorrecta
       como argumento: el admin que instala con usuario distinto de "hermes-user"
       DEBE añadir un bloque <policy user="..."> explícito para ese UID (F-2 firmado).
       Un grant de grupo amplio es un vector de escalada si cualquier proceso del
       grupo se compromete.

       REEMPLAZADO POR: grants explícitos por user="hermes" (shell-server proxy,
       bloque 1 arriba) + user="hermes-user" (operador, bloque 3 abajo) con
       deny belt-and-suspenders para verbos críticos desde user="hermes".

       BELT-AND-SUSPENDERS: deny explícito de los verbos de gobernanza más críticos
       para user="hermes" (el daemon mismo + shell-server que corre como ese usuario).
       Estos verbos NUNCA deben viajar de hermes → hermes; van operador → hermes.
       Añadir aquí refuerza la defensa incluso si un futuro grant amplio los
       volviera a habilitar por error.
       ================================================================ -->
  <policy user="hermes">
    <!-- spec 014 increment 3: consent mutators are operator-only. The daemon
         (hermes user / shell-server proxy) MUST NOT grant/revoke consent on its
         own behalf — that would let a compromised worker self-authorize capability
         access without passing through the operator's identity channel. -->
    <deny send_destination="org.hermes.Runtime"
          send_interface="org.hermes.Runtime1"
          send_member="GrantConsent"/>
    <deny send_destination="org.hermes.Runtime"
          send_interface="org.hermes.Runtime1"
          send_member="RevokeConsent"/>
    <deny send_destination="org.hermes.Runtime"
          send_interface="org.hermes.Runtime1"
          send_member="PromoteSkill"/>
    <deny send_destination="org.hermes.Runtime"
          send_interface="org.hermes.Runtime1"
          send_member="SignComposioSkill"/>
    <deny send_destination="org.hermes.Runtime"
          send_interface="org.hermes.Runtime1"
          send_member="BindCapabilityToAgent"/>
    <deny send_destination="org.hermes.Runtime"
          send_interface="org.hermes.Runtime1"
          send_member="SetAgentHouseRule"/>
    <!-- P1 / CWE-441 confused-deputy belt-and-suspenders (2026-06-06):
         Approve/Reject are HITL verbs with the highest impact (executing
         irreversible writes, unblocking HIGH-risk proposals).  They MUST flow
         from the human operator (hermes-user, uid 1000) directly — never
         through the shell-server proxy (user=hermes).  A compromised hermes
         process calling Approve would self-approve HITL without operator consent.
         Removing these from the allow list above plus adding explicit denies here
         provides defense-in-depth: even if a future allow-list change accidentally
         re-grants send_type="method_call" to hermes, these denies remain. -->
    <deny send_destination="org.hermes.Runtime"
          send_interface="org.hermes.Runtime1"
          send_member="Approve"/>
    <deny send_destination="org.hermes.Runtime"
          send_interface="org.hermes.Runtime1"
          send_member="Reject"/>
  </policy>

  <!-- ================================================================
       3. OPERADOR DE LOGIN (hermes-user) — verbos mutadores + lectura
       F-2 FIRMADO: "hermes-user" es el usuario de autologin de Agents OS
       Edition (gdm/custom.conf:AutomaticLogin=hermes-user,
       build/bib-config.toml:name=hermes-user). Este es el operador humano
       que interactúa con la Hermes Shell (sesión gráfica GDM).

       CONFIGURACIÓN POR INSTALACIÓN: en despliegues con usuario de operador
       distinto de "hermes-user", sustituir o añadir un bloque <policy user="...">
       equivalente. El set exacto de UIDs autorizados se documenta en el
       threat-model actualizado del instalador (F-2).

       Verbos mutadores (requieren autoridad de operador, CTRL-P1-2/7):
         Enqueue / Pause / Resume / Approve / Reject

       Verbos de lectura (metadatos, sin payload ni instruction, CTRL-P1-5):
         GetQueueStatus / ListPending / GetTaskStatus

       Señales (el operador puede suscribirse al estado de la cola):
         TaskEnqueued / TaskStatusChanged / TaskPendingApproval /
         AgentPaused / AgentResumed / AgentLivenessChanged
       ================================================================ -->
  <policy user="hermes-user">

    <!-- ====================================================================
         ALLOW-DEFAULT PARA EL COMPOSITOR (decisión de producto).
         hermes-user ES la UI de confianza del SO (el compositor de la sesión
         local). Puede invocar CUALQUIER método de org.hermes.Runtime1. Antes
         esto era una allow-list verbo-a-verbo: cada método nuevo que se
         olvidaba de añadir aquí daba "Access denied" y el usuario creía que
         la feature estaba rota (era solo permisos). El default ahora es
         PERMITIR; el usuario restringe si quiere.

         La frontera de seguridad REAL no es esta policy (la UI es de
         confianza) sino el BROKER/HITL del daemon: las ACCIONES del agente
         autónomo sobre el mundo (navegador, ficheros, shell, red) pasan por
         consentimiento tipo burbuja (allow/deny/recordar), y el confinamiento
         kernel del navegador. Eso es lo que protege a un SO público — no
         negar a la propia UI llamar a su daemon.
         ==================================================================== -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_type="method_call"/>

    <!-- ====================================================================
         RECEIVE de SIGNALS del daemon (CRÍTICO — W26/W27).
         El context="default" (abajo) hace DENY-DEFAULT de recibir signals de
         org.hermes.Runtime1. El compositor SE SUSCRIBE bien (signals_primed),
         pero sin este <allow> el bus NO le ENTREGA la señal → la feature
         parece rota aunque el código esté perfecto. Cubre:
           · AppLaunchRequested  → lanzar apps + el navegador VISIBLE del Cerebro
           · ApprovalRequested   → tarjeta de permiso de comandos peligrosos
           · ScanCompleted / InstallReviewRequested → flujo de instalación
         Es la trampa D-Bus recurrente: signal nueva → allow receive o "no llega".
         ==================================================================== -->
    <allow receive_sender="org.hermes.Runtime"
           receive_interface="org.hermes.Runtime1"
           receive_type="signal"/>

    <!-- Los <allow> por-método de abajo quedan como documentación del
         contrato; el allow-default de arriba ya los cubre. == -->

    <!-- == VERBOS MUTADORES (CWE-862: grant mínimo por método) == -->

    <!--
      Enqueue: encola una tarea nueva. El adapter sobrescribirá enqueued_by
      con el UID resuelto de SO_PEERCRED (CTRL-P1-3). La política D-Bus es
      una capa de profundidad; la authZ final la hace el adapter en Python.
    -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="Enqueue"
           send_type="method_call"/>

    <!--
      Pause: kill-switch del agente (A2 en el threat-model). Solo el operador
      con sesión activa puede pausar. Previene DoS involuntario desde servicios
      de sistema que no deberían tener este poder (CTRL-P1-7).
    -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="Pause"
           send_type="method_call"/>

    <!--
      Resume: reanuda el agente pausado. Simétricamente restringido a operador,
      ya que reanudar sin autoridad es bypass de contención (threat-model TB1).
    -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="Resume"
           send_type="method_call"/>

    <!--
      Approve: aprobación HITL (A3). Aprobar un HIGH sin autoridad = ejecutar
      writes irreversibles en el SO. Es el verbo de mayor impacto.
    -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="Approve"
           send_type="method_call"/>

    <!--
      Reject: rechazo HITL. Simétricamente restringido; un Reject no autorizado
      bloquea tareas y degrada el servicio (DoS lógico).
    -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="Reject"
           send_type="method_call"/>

    <!-- == GATE 0 / M1: PROVIDERS OS-nativos (operador directo, cero token) ==
         El operador configura sus LLM providers por D-Bus al daemon (que posee
         la tabla + SecretsVault), sustituyendo el HTTP del shell-server. Grant
         mínimo por método (CWE-862). TestProvider valida por el runtime REAL. -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="ListProviders"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="GetActiveProvider"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="AddProvider"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="UpdateProvider"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="DeleteProvider"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="SetActiveProvider"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="TestProvider"
           send_type="method_call"/>

    <!-- == GATE 0 / M2: CHAT (conversaciones) OS-nativo ==
         Lecturas de historial + borrado por el operador directo. El daemon
         posee el store; el stream de respuesta va por el socket AF_UNIX. -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="ListConversations"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="GetConversation"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="DeleteConversation"
           send_type="method_call"/>

    <!-- == GATE 0 / M7: cuenta de SO (onboarding) — operador directo == -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="StageAccount"
           send_type="method_call"/>

    <!-- == spec 014 increment 3: CONSENT CONTROL (FR-013) ==
         GrantConsent / RevokeConsent: mutators — by sender_uid (CWE-862).
           human_operator_id ALWAYS resolved server-side from sender_uid;
           the wiring ignores any identity field in the payload (CTRL-P1-3).
           Only the operator of the active session (hermes-user) may grant/revoke.
           The daemon (hermes user) MUST NOT call these verbs — they are
           panel→daemon only. Belt-and-suspenders deny in the hermes policy
           block prevents daemon self-calls from escalating consent state.
         ListConsents: read-only — same policy as list_* (CTRL-P1-5).
           Scoped to the calling operator by sender_uid server-side.
           The daemon user is excluded by the context=default deny block. -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="GrantConsent"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="RevokeConsent"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="ListConsents"
           send_type="method_call"/>

    <!-- == T047: Memory read-only verbs (spec 014-agentic-desktop, increment 2) ==
         ListMemory / SearchMemory: lectura de la memoria del agente.
         Read-only — sin efector, sin muta, sin broker. Mismo nivel de
         restricción que list_providers/list_conversations: CTRL-P1-5.
         PII: el contenido se trunca en el wiring (never full raw content
         over the bus). No authZ adicional — el operador de sesión puede
         supervisar la memoria del agente que está usando. -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="ListMemory"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="SearchMemory"
           send_type="method_call"/>

    <!-- == App Store del SO (Apps → dnf + Flathub) ==
         List/Search: read-only (patrón list_*). Install/Uninstall: mutadores
         con authZ de operador por sender_uid en el wiring (CWE-862);
         GetPkgOpStatus: read-only (sondeo del op async). -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="ListInstalledPackages"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="SearchPackages"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="InstallPackage"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="UninstallPackage"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="GetPkgOpStatus"
           send_type="method_call"/>

    <!-- == Acceso remoto (Settings → toggle, espejo noVNC + URL pública) ==
         EnableRemoteAccess / DisableRemoteAccess: mutators — la contraseña
         del dispositivo viaja al staged request y el root helper la verifica
         por PAM (hermes-remote-access-control). El daemon NO toca systemd;
         escribir el request NO basta para activar (defensa CTRL del helper).
         GetRemoteAccessStatus: read-only {active, url} — patrón list_*. -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="EnableRemoteAccess"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="DisableRemoteAccess"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="GetRemoteAccessStatus"
           send_type="method_call"/>

    <!-- == T017: Desktop overlay (spec 014-agentic-desktop) ==
         OpenOverlay: idempotente, sin estado, sin efector — solo confirma que
         el daemon está vivo y emite la señal OverlayRequested. Seguro para
         hermes-user (el operador de la sesión GNOME real).
         EnqueueFromOverlay: chat del overlay → cola del daemon. Autoridad de
         operador idéntica a Enqueue; delegación interna a ControlPlaneService.
         RequestContextSnapshot: read-only (AT-SPI + screenshot consentida).
         Screenshot solo si hay consent SCREEN_CAPTURE activo — no muta nada.
         GetAuditChainHead: read-only — head hash de la cadena de auditoría.
         Solo metadatos (hash hex + estado); sin payload de acciones. -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="OpenOverlay"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="EnqueueFromOverlay"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="RequestContextSnapshot"
           send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="GetAuditChainHead"
           send_type="method_call"/>

    <!-- Señal OverlayRequested (emitida por el daemon cuando llega OpenOverlay).
         El overlay process (hermes-user) se suscribe para saber cuándo ponerse
         en primer plano. Metadato puro, sin PII. -->
    <allow receive_sender="org.hermes.Runtime"
           receive_interface="org.hermes.Runtime1"
           receive_member="OverlayRequested"
           receive_type="signal"/>

    <!-- ================================================================
         == GOBERNANZA DEL SO — paneles del operador (LumenSO desktop) ==
         ================================================================
         Los paneles del desktop (Agents, Skills, Integraciones/Composio,
         Providers, Tasks) corren EN EL PROCESO del compositor, que es
         hermes-user (el operador humano, uid 1000). Estos verbos son la
         contrapartida de los ya permitidos arriba (AddProvider, GrantConsent,
         Enqueue…): MISMA clase de autoridad de operador.

         SEGURIDAD (deny-default intacto):
           - Solo se concede a user="hermes-user" (el operador). El daemon
             (user="hermes": runtime/shell-server/audit) sigue EXCLUIDO por el
             bloque context=default + los deny belt-and-suspenders de arriba
             (PromoteSkill/SignComposioSkill/BindCapabilityToAgent/
             SetAgentHouseRule ya tienen deny explícito para "hermes").
           - NUNCA se amplía a group="hermes" (vector de escalada, finding #7).
           - Los read-only (List*/Get*) son CTRL-P1-5 (metadatos, sin payload).
           - Los mutadores (Create/Update/Delete/Set/Connect/Enable…) llevan la
             identidad del operador resuelta server-side por SO_PEERCRED en el
             adapter (CTRL-P1-3); la política de bus es defensa en profundidad.
         REVISAR con security-engineer antes de multi-tenant (F-2). -->

    <!-- (A) Catálogo nativo de providers (42+) + platform models + OAuth device-code
         (StartProviderOauth muta el auth-store → autoridad de operador, igual que
         AddProvider; GetProviderOauthStatus es read-only de la sesión en memoria) -->
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListNativeProviders" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ConfigureNativeProvider" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="GetNativeActive" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="StartProviderOauth" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="GetProviderOauthStatus" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListPlatformModels" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="GetPlatformModelSummary" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListModelGaps" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="EnablePlatformModel" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="DisablePlatformModel" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="DeprecatePlatformModel" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ClosePlatformTour" send_type="method_call"/>

    <!-- (B) Agents (profiles) — lectura + CRUD del operador -->
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListAgents" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="GetActiveAgent" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="SetActiveAgent" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="CreateAgent" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="UpdateAgent" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="DeleteAgent" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListAgentCapabilities" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="BindCapabilityToAgent" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="UnbindCapabilityFromAgent" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="SetAgentHouseRule" send_type="method_call"/>

    <!-- (C) Skills — lectura + promover/deprecar/firmar (operador) -->
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListSkills" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="PromoteSkill" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="DeprecateSkill" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="SignComposioSkill" send_type="method_call"/>

    <!-- (D) Composio (Integraciones) — estado/catálogo + key/connect (operador) -->
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="GetComposioStatus" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListComposioApps" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListComposioConnections" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="SetComposioApiKey" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ConnectComposioApp" send_type="method_call"/>

    <!-- (E) Tasks — lectura de lo programado/reciente (CTRL-P1-5) -->
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListConfiguredTasks" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListRecentTasks" send_type="method_call"/>
    <!-- (E2) Tasks — calendario per-agent (P3): crear/borrar/toggle (mutadores, operador) -->
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="CreateScheduledTask" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="DeleteScheduledTask" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="SetScheduledTaskEnabled" send_type="method_call"/>

    <!-- (F2) Skill Hub — búsqueda (read-only, red) + cancel + install/uninstall
         (mutadores, clonan repos al HERMES_HOME del daemon; authZ operador). -->
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="SearchSkillsHub" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="CancelSkillsHubSearch" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListHubSkills" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="InstallHubSkill" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="UninstallHubSkill" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="GetHubOpStatus" send_type="method_call"/>

    <!-- (F) MCP Apps — gestión de servidores MCP por el operador. Add/Remove
         mutan config + lanzan/paran procesos (runner allowlist en el wiring);
         List es read-only (CTRL-P1-5). -->
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListMcpServers" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="AddMcpServer" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="RemoveMcpServer" send_type="method_call"/>
    <!-- MCP Registry oficial — read-only, sin authZ (patrón list_*). -->
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="SearchMcpRegistry" send_type="method_call"/>
    <!-- Security Center — Get/List son read-only; Set/Record mutan (authZ en el
         wiring vía _authorize_and_resolve). Sin estos <allow> la policy
         deny-default da "Access denied" y la pantalla sale vacía. -->
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="GetSecurityPolicy" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="SetSecurityPolicy" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="ListRecentScans" send_type="method_call"/>
    <allow send_destination="org.hermes.Runtime" send_interface="org.hermes.Runtime1" send_member="RecordInstallDecision" send_type="method_call"/>

    <!-- == VERBOS DE LECTURA (CTRL-P1-5: solo metadatos, sin payload) == -->

    <!--
      GetQueueStatus: snapshot de la cola (state, pending, in_progress,
      pending_approval, last_audit_head). El adapter NO devuelve payload_json
      ni instruction (CTRL-P1-5); esta capa de bus permite la llamada.
    -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="GetQueueStatus"
           send_type="method_call"/>

    <!--
      ListPending: lista de tareas PENDING (task_id, kind, priority,
      enqueued_at). Metadatos only, sin payload (CTRL-P1-5).
    -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="ListPending"
           send_type="method_call"/>

    <!--
      GetTaskStatus: estado de UNA tarea — usado en re-attach al stream.
      Incluye stream_path pero NUNCA payload_json/instruction (CTRL-P1-5).
    -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.hermes.Runtime1"
           send_member="GetTaskStatus"
           send_type="method_call"/>

    <!-- == RECEPCIÓN DE REPLIES Y SIGNALS == -->

    <!--
      El operador recibe las respuestas (method_return) a sus llamadas.
      Sin esto el bus descargaría la respuesta del daemon antes de que llegue
      al proceso de la Hermes Shell.
    -->
    <allow receive_sender="org.hermes.Runtime"
           receive_type="method_return"/>
    <allow receive_sender="org.hermes.Runtime"
           receive_type="error"/>

    <!--
      Signals de estado: el operador se suscribe para actualizar la UI de la
      shell (estado de cola, liveness del agente, HITL pendiente).
      Son metadatos (task_id, kind, status, uid numérico) sin PII de payload.
    -->
    <allow receive_sender="org.hermes.Runtime"
           receive_interface="org.hermes.Runtime1"
           receive_member="TaskEnqueued"
           receive_type="signal"/>

    <allow receive_sender="org.hermes.Runtime"
           receive_interface="org.hermes.Runtime1"
           receive_member="TaskStatusChanged"
           receive_type="signal"/>

    <allow receive_sender="org.hermes.Runtime"
           receive_interface="org.hermes.Runtime1"
           receive_member="TaskPendingApproval"
           receive_type="signal"/>

    <allow receive_sender="org.hermes.Runtime"
           receive_interface="org.hermes.Runtime1"
           receive_member="AgentPaused"
           receive_type="signal"/>

    <allow receive_sender="org.hermes.Runtime"
           receive_interface="org.hermes.Runtime1"
           receive_member="AgentResumed"
           receive_type="signal"/>

    <allow receive_sender="org.hermes.Runtime"
           receive_interface="org.hermes.Runtime1"
           receive_member="AgentLivenessChanged"
           receive_type="signal"/>

    <!--
      Introspection: permite que herramientas de depuración (gdbus, busctl)
      descubran la interfaz. No expone datos de usuario; el XML de introspección
      es el contrato público del método. Solo permitido al operador (no context=default)
      para reducir la superficie de enumeración (CTRL-P1-5 spirit).
    -->
    <allow send_destination="org.hermes.Runtime"
           send_interface="org.freedesktop.DBus.Introspectable"
           send_member="Introspect"
           send_type="method_call"/>

    <allow receive_sender="org.hermes.Runtime"
           receive_interface="org.freedesktop.DBus.Introspectable"
           receive_type="method_return"/>

  </policy>

</busconfig>
