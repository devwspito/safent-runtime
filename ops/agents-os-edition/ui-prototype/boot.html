<!DOCTYPE html>
<html lang="es" data-accent="amber">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LumenSO</title>
<style>
@import url('https://rsms.me/inter/inter.css');
:root{--acc:#EFA45C;--acc-2:#E2864B;--acc-glow:rgba(239,164,92,.5);--ink:#F4F5F7;--ink-3:#7C8190}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:#0B0C0F;color:var(--ink);-webkit-font-smoothing:antialiased;display:grid;place-items:center;letter-spacing:-.01em}
.bg{position:fixed;inset:0;background:radial-gradient(120% 120% at 50% 42%,#14161D 0%,#0B0C0F 62%)}
.bg::before{content:'';position:absolute;inset:0;background:radial-gradient(36% 30% at 50% 44%,var(--acc-glow),transparent 62%);filter:blur(60px);opacity:.5;animation:breathe 3.6s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.32;transform:scale(.96)}50%{opacity:.6;transform:scale(1.04)}}
.stack{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:30px}
.mark{width:88px;height:88px;border-radius:26px;position:relative;
  background:radial-gradient(circle at 32% 26%,#fff8,transparent 56%),linear-gradient(135deg,var(--acc),var(--acc-2));
  box-shadow:0 22px 60px -10px var(--acc-glow),inset 0 0 0 1px rgba(255,255,255,.22);
  animation:rise 1s cubic-bezier(.16,1,.3,1) both}
.mark::after{content:'';position:absolute;inset:-10px;border-radius:34px;border:1px solid var(--acc);opacity:0;animation:halo 3.6s ease-in-out infinite}
@keyframes halo{0%,100%{opacity:0;transform:scale(.92)}50%{opacity:.22;transform:scale(1.08)}}
@keyframes rise{from{opacity:0;transform:translateY(18px) scale(.9)}to{opacity:1;transform:none}}
.word{font-size:21px;font-weight:680;letter-spacing:-.02em;opacity:0;animation:fade .9s .35s forwards}
.word span{color:var(--ink-3);font-weight:500}
@keyframes fade{to{opacity:1}}
.bar{width:180px;height:3px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;opacity:0;animation:fade .9s .5s forwards}
.bar i{display:block;height:100%;width:40%;border-radius:3px;background:linear-gradient(90deg,transparent,var(--acc),transparent);box-shadow:0 0 12px var(--acc-glow);animation:load 1.7s cubic-bezier(.5,0,.5,1) infinite}
@keyframes load{0%{transform:translateX(-120%)}100%{transform:translateX(420%)}}
.foot{position:fixed;bottom:30px;left:0;right:0;text-align:center;font-size:11.5px;color:var(--ink-3);opacity:0;animation:fade .9s 1s forwards;display:flex;align-items:center;justify-content:center;gap:7px}
.foot svg{width:13px;height:13px;stroke:var(--acc);fill:none;stroke-width:1.8}
</style>
</head>
<body>
<div class="bg"></div>
<div class="stack">
  <div class="mark"></div>
  <div class="word">LumenSO<span> · despertando a Hermes</span></div>
  <div class="bar"><i></i></div>
</div>
<div class="foot"><svg viewBox="0 0 24 24"><path d="M12 2 4 7v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V7z"/></svg> Confinamiento de kernel · tu inteligencia, en tu equipo</div>
</body>
</html>
