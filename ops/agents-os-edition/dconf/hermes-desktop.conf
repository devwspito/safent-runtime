# dconf keyfile — Agents OS Edition desktop settings.
#
# T014 — feature 014 (agentic desktop): tema Sereno + favoritos del dock +
# allowlist de extensiones.
#
# Compilado en la imagen como base de datos dconf del sistema:
#   dconf update — genera /etc/dconf/db/local.d/hermes-desktop compiled.
#
# Jerarquía dconf: /etc/dconf/db/local.d/ → base "local" que aplica por
# defecto a todos los usuarios y puede ser sobreescrita por el usuario
# en ~/.config/dconf/user.
#
# Referencia: https://help.gnome.org/admin/system-admin-guide/stable/dconf-keyfiles.html.en

# ---------------------------------------------------------------------------
# Tema visual: Adwaita oscuro + acento Sereno (morado).
# ---------------------------------------------------------------------------
[org/gnome/desktop/interface]
color-scheme='prefer-dark'
gtk-theme='Adwaita'
accent-color='purple'
# Inter es la fuente de la identidad Sereno (spec 011); rsms-inter-fonts
# está horneado en la imagen. Fallback a Cantarell si Inter no carga.
document-font-name='Inter 11'
font-name='Inter 11'
monospace-font-name='Source Code Pro 10'

# ---------------------------------------------------------------------------
# Dock favoritos (gnome-shell built-in dash + dash-to-dock superpuesto).
# El orden: apps Hermes → navegador personal → ofimática → archivos → terminal.
# ---------------------------------------------------------------------------
[org/gnome/shell]
# Las apps del humano (P1, feature 014 US1).
# chromium-personal.desktop = el Chromium del HUMANO (libre, sin jaula).
# chromium-browser.desktop ya existe en el RPM; el .desktop personal es el
# que los .desktop horneados de T020 instalan en /usr/share/applications/.
favorite-apps=['hermes-chat.desktop', 'hermes-tasks.desktop', 'hermes-security.desktop', 'hermes-skills.desktop', 'hermes-integrations.desktop', 'hermes-memory.desktop', 'chromium-personal.desktop', 'libreoffice-writer.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.Terminal.desktop']
# Allowlist de extensiones: la nuestra + dash-to-dock (spec 014 T1).
# Ambas están horneadas en /usr/share/gnome-shell/extensions/ (no en $HOME) →
# cumplen la invariante "solo extensiones del sistema, cero de $HOME".
# enabled-extensions ES el allowlist — cualquier extensión no listada NO carga
# (CTRL-EXT-SHELL-2). disable-user-extensions=false porque 'true' bloquearía
# también las del sistema; el allowlist ya garantiza que terceros no carguen.
enabled-extensions=['hermes@hermes.os', 'dash-to-dock@micxgx.gmail.com']
disable-user-extensions=false

# ---------------------------------------------------------------------------
# Dash-to-dock: dock siempre visible en la parte inferior (spec 014 T1).
# Configuración razonable para un SO de escritorio agéntico de uso diario.
# ---------------------------------------------------------------------------
[org/gnome/shell/extensions/dash-to-dock]
# Posición y visibilidad
dock-position='BOTTOM'
autohide=false
intellihide=false
# Iconos
dash-max-icon-size=40
icon-size-fixed=true
# Aspecto — integrado con el tema Adwaita oscuro
transparency-mode='FIXED'
background-opacity=0.85
# El dock ocupa toda la pantalla (extend-height=false → solo los iconos, no llega al borde)
extend-height=false
# Comportamiento
show-show-apps-button=true
show-trash=false
show-mounts=false

# ---------------------------------------------------------------------------
# Screensaver / lock — el agente trabaja 24/7 (FR-042, ya en gschema.override).
# Se repite aquí para que el user db tenga precedencia sobre cualquier schema
# default que pueda colisionar.
# ---------------------------------------------------------------------------
[org/gnome/desktop/screensaver]
lock-enabled=false
idle-activation-enabled=false

[org/gnome/desktop/session]
idle-delay=uint32 0

# ---------------------------------------------------------------------------
# Power management — evitar sleep mientras el agente razona.
# ---------------------------------------------------------------------------
[org/gnome/settings-daemon/plugins/power]
sleep-inactive-ac-type='nothing'
sleep-inactive-battery-type='nothing'
power-button-action='nothing'
idle-dim=false
