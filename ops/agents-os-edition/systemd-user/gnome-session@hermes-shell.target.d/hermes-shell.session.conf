[Unit]
# Drop-in for gnome-session@hermes-shell.target.
#
# PURPOSE: pull org.gnome.Shell@wayland.service into the dependency graph
# for the hermes-shell session.
#
# WHY THIS IS NEEDED (bug root cause):
#   org.gnome.Shell.desktop carries X-GNOME-HiddenUnderSystemd=true, which
#   means gnome-session-binary NEVER launches gnome-shell via autostart.
#   Instead, gnome-shell is expected to be started by the systemd user manager
#   via org.gnome.Shell@wayland.service. That service is only reachable through
#   the dependency chain:
#
#     gnome-session-wayland@hermes-shell.target
#       └─ Requires ─► gnome-session@hermes-shell.target      (template instantiated)
#                         └─ [THIS DROP-IN] ──────────────────►
#                              Requires ─► org.gnome.Shell.target
#                                            └─ Wants ─► org.gnome.Shell@wayland.service
#                                                           └─ ExecStart=/usr/bin/gnome-shell
#
#   Without this drop-in, gnome-session@hermes-shell.target has no unit pulling
#   org.gnome.Shell.target, so gnome-shell and mutter are never started — the
#   session reaches "Entering running state" with GS=0, MUT=0, and every app
#   that tries to connect to the compositor gets "cannot open display".
#
# HOW STOCK GNOME DOES IT:
#   /usr/lib/systemd/user/gnome-session@gnome.target.d/gnome.session.conf
#   does exactly this for the "gnome" session. We mirror it for "hermes-shell".
#   The comment "Must be in sync with <session>.session" in both files means
#   the RequiredComponents= in hermes-shell.session must list the same GSD
#   components that appear as Wants= here. gnome-session-binary uses the
#   .session file for its own component list; systemd uses THIS drop-in to
#   know which units to start.
#
# SPEC: feature 014 / spec 014 increment 1 (T013 fix).

# --- GSD targets (must match RequiredComponents in hermes-shell.session) ---
Wants=org.gnome.SettingsDaemon.A11ySettings.target
Wants=org.gnome.SettingsDaemon.Color.target
Wants=org.gnome.SettingsDaemon.Datetime.target
Wants=org.gnome.SettingsDaemon.Housekeeping.target
Wants=org.gnome.SettingsDaemon.Keyboard.target
Wants=org.gnome.SettingsDaemon.MediaKeys.target
Wants=org.gnome.SettingsDaemon.Power.target
Wants=org.gnome.SettingsDaemon.PrintNotifications.target
Wants=org.gnome.SettingsDaemon.Rfkill.target
Wants=org.gnome.SettingsDaemon.ScreensaverProxy.target
Wants=org.gnome.SettingsDaemon.Sharing.target
Wants=org.gnome.SettingsDaemon.Smartcard.target
Wants=org.gnome.SettingsDaemon.Sound.target
Wants=org.gnome.SettingsDaemon.UsbProtection.target
Wants=org.gnome.SettingsDaemon.Wacom.target
Wants=org.gnome.SettingsDaemon.XSettings.target

# --- THE CRITICAL LINE ---
# This pulls org.gnome.Shell.target, which Wants org.gnome.Shell@wayland.service.
# org.gnome.Shell@wayland.service has ConditionEnvironment=XDG_SESSION_TYPE=wayland
# (already exported by gdm-wayland-session / hermes-shell-session-wrapper).
# RefuseManualStart=on on that service is not a problem: it is started as a
# dependency (Wants), not manually.
Requires=org.gnome.Shell.target
